matching:
  # Include a job if its title belongs to the software-engineer family.
  # Matching is normalised: case, hyphens, C#/CSharp/.NET/dotnet, and
  # Roman numerals (II/III) are treated as equal to Arabic (2/3).
  # No specific seniority is required — any level in the family passes.
  title_family:
    - "software engineer"
    - "software engr"
    - "software senior engineer"
    - "software developer"
    - "software development engineer"
    - "SDE"
    - "SWE"
    - "full stack engineer"
    - "backend engineer"
    - "full-stack developer"
    - "backend developer"
    - ".NET developer"
    - "application developer"
    - "application engineer"

  # Keep a job only if its description mentions at least one of these skills.
  skills:
    - ".NET"
    - ".NET Core"
    - ".NET Framework"
    - "dotnet"
    - "C#"
    - "ASP.NET"
    - "Web API"
    - "SQL Server"
    - "T-SQL"
    - "Azure"
    - "Angular"
    - "TypeScript"
    - "React"
    - "Entity Framework"

  # At least one of these "hard" .NET skills must appear in the description.
  # Azure/Angular/TypeScript/React alone are NOT sufficient — they appear in too
  # many non-.NET job postings. Leave this list empty to disable the check.
  primary_skills:
    - ".NET"
    - ".NET Core"
    - ".NET Framework"
    - "dotnet"
    - "C#"
    - "ASP.NET"
    - "Entity Framework"
    - "Web API"
    - "SQL Server"
    - "T-SQL"

  # Reject a job immediately if its title contains any of these terms.
  exclude_terms:
    - "intern"
    - "internship"
    - "trainee"
    - "apprentice"
    - "fresher"
    - "graduate"
    - "new grad"
    - "university"
    - "principal"
    - "director"
    - "vice president"
    - "VP"
    - "head of"
    - "engineering manager"
    - "manager"
    - "mechanical"
    - "electrical"
    - "industrial"
    - "hardware"
    - "firmware"
    - "embedded"
    - "datacenter technician"
    - "network engineer"
    - "sales engineer"
    - "solutions engineer"
    - "customer engineer"
    - "support engineer"
    - "data scientist"

