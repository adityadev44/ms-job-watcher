# Job Watcher Configuration
# Do NOT commit this file to git — it may contain notification secrets.

search:
  keywords:
    - "software engineer"
    - "senior software engineer"
    - "software development engineer"
    - "SDE"
    - "full stack engineer"
    - "backend engineer"
    - ".NET developer"
    - "C# developer"
  locations: []

optum_search:
  keywords:
    - "software engineer"
    - "senior software engineer"
    - "software development engineer"
    - "SDE"
    - ".NET developer"
    - "C# developer"
    - "dot net"
    - "angular"
  locations:
    - "India"
  exclude_locations:
    - "Chennai"
    - "Tamil Nadu"

amazon_search:
  keywords:
    - "software engineer"
    - "senior software engineer"
    - "software development engineer"
    - "SDE"
    - ".NET developer"
    - "C# developer"
    - "dot net"
    - "angular"
  locations: []
  exclude_locations:
    - "Chennai"
    - "Tamil Nadu"

matching:
  # Include a job if its title belongs to the software-engineer family.
  # Matching is normalised: case, hyphens, C#/CSharp/.NET/dotnet, and
  # Roman numerals (II/III) are treated as equal to Arabic (2/3).
  # No specific seniority is required — any level in the family passes.
  title_family:
    - "software engineer"
    - "software development engineer"
    - "SDE"
    - "SWE"
    - "full stack engineer"
    - "backend engineer"
    - "full-stack developer"
    - "backend developer"
    - ".NET developer"
    - "application developer"
    - "application engineer"

  # Keep a job only if its description mentions at least one of these skills.
  skills:
    - ".NET"
    - ".NET Core"
    - ".NET Framework"
    - "dotnet"
    - "C#"
    - "ASP.NET"
    - "Web API"
    - "REST"
    - "SQL Server"
    - "T-SQL"
    - "SQL"
    - "Azure"
    - "Angular"
    - "TypeScript"
    - "JavaScript"
    - "React"
    - "Entity Framework"

  # Reject a job immediately if its title contains any of these terms.
  exclude_terms:
    - "intern"
    - "internship"
    - "trainee"
    - "apprentice"
    - "fresher"
    - "graduate"
    - "new grad"
    - "university"
    - "principal"
    - "director"
    - "vice president"
    - "VP"
    - "head of"
    - "engineering manager"
    - "manager"
    - "mechanical"
    - "electrical"
    - "industrial"
    - "hardware"
    - "firmware"
    - "embedded"
    - "datacenter technician"
    - "network engineer"
    - "sales engineer"
    - "solutions engineer"
    - "customer engineer"
    - "support engineer"
    - "data scientist"

notifications:
  email:
    recipient: ""     # e.g. "you@example.com"

  telegram:
    bot_token: ""     # e.g. "123456:ABC-DEF..."
    chat_id: ""       # e.g. "987654321"
