# Job Watcher Configuration
# Safe operational settings live here; notification credentials are read only
# from environment variables / GitHub Secrets by src/notifier.py.

# YAML anchors keep the intentionally shared search policy in one place while
# allowing individual companies to override ATS-specific limits and exceptions.
_defaults:
  keywords: &default_keywords
    - "software engineer"
    - "senior software engineer"
    - ".NET developer"
    - "C# developer"
    - "dot net"
    - "angular"
  india_locations: &india_locations
    - "India"
  exclude_locations: &default_exclude_locations
    - "Chennai"
    - "Tamil Nadu"
    - "Pune"
    - "Chandigarh"
    - "Kochi"
    - "Kerala"
    - "Trivandrum"
    - "Lucknow"
    - "Nagpur"
    - "Madurai"
    - "Kolkata"
    - "Indore"

search:
  max_listings: 350
  inter_page_delay: 0.1
  keywords:
    - "software engineer"
    - "senior software engineer"
    - "software development engineer"
    - "SDE"
    - "full stack engineer"
    - "backend engineer"
    - ".NET developer"
    - "C# developer"
  locations: []
  exclude_locations: *default_exclude_locations

