name: Job Watcher

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # also runnable manually from the GitHub UI

concurrency:
  group: job-watcher
  cancel-in-progress: false    # queue runs; never allow two to write seen state simultaneously

permissions:
  contents: write              # needed so the job can commit seen state back

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Sync to latest master
        # actions/checkout pins the SHA at run-creation time, not job-start time.
        # Queued runs must fast-forward past state commits made while they waited,
        # otherwise already-alerted jobs can be sent again.
        run: git pull --ff-only origin master

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install firefox

      - name: Install Playwright system deps
        run: playwright install-deps firefox

      - name: Run all watchers with bounded concurrency
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
        run: python -u src/run_all.py --workers 10

      - name: Save updated watcher state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.jsonunion.driver "python3 scripts/merge_seen_jobs_union.py %O %A %B"
          # -u deliberately stages only already-tracked state files. The quoted
          # pathspec covers Microsoft's seen_jobs.json and every company suffix.
          git add -u -- 'seen_jobs*.json' pipeline_failures.json
          if git diff --staged --quiet; then
            echo "No watcher state changes this run"
          else
            git commit -m "chore: update watcher state [skip ci]"
            pushed=0
            for attempt in 1 2 3; do
              if git pull --rebase origin master && git push; then
                pushed=1
                break
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep 5
            done
            if [ "$pushed" -ne 1 ]; then
              echo "::error::Failed to push watcher state after 3 attempts -- dedup state was NOT saved; expect duplicate alerts next run."
              exit 1
            fi
          fi
