          test -f seen_jobs_ibm.json && git add seen_jobs_ibm.json || true
          test -f pipeline_failures.json && git add pipeline_failures.json || true
          if git diff --staged --quiet; then
            echo "No new jobs this run"
          else
            git commit -m "chore: update seen_jobs.json [skip ci]"
            pushed=0
            for attempt in 1 2 3; do
              if git pull --rebase origin master && git push; then
                pushed=1
                break
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep 5
            done
            if [ "$pushed" -ne 1 ]; then
              echo "::error::Failed to push seen_jobs state after 3 attempts — dedup state for this run's new matches was NOT saved; expect duplicate alerts next run."
              exit 1
            fi
          fi
