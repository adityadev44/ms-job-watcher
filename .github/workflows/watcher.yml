          wait $pid68 || fail=1
          wait $pid69 || fail=1
          exit $fail

      - name: Save updated seen_jobs files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.jsonunion.driver "python3 scripts/merge_seen_jobs_union.py %O %A %B"
          git add seen_jobs.json
          test -f seen_jobs_optum.json && git add seen_jobs_optum.json || true
