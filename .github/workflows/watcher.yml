name: Job Watcher (69 companies)

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # also runnable manually from the GitHub UI

concurrency:
  group: job-watcher
  cancel-in-progress: false    # queue runs; never allow two to write seen_jobs files simultaneously

permissions:
  contents: write              # needed so the job can commit seen_jobs.json back

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Sync to latest master
        # actions/checkout pins the SHA at run-creation time, not job-start time.
        # concurrency queues runs, and a full pipeline run takes 30-45 min, so a
        # queued run can sit behind one that finishes and pushes new seen_jobs
        # commits mid-wait. Without this, the queued run starts from a stale
        # checkout, misses those commits, and re-alerts jobs already sent.
        # Safe fast-forward: nothing local has been touched yet at this point.
        run: git pull --ff-only origin master

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install firefox

      - name: Install Playwright system deps
        run: playwright install-deps firefox

      - name: Run all watchers in parallel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
        run: |
          python -u src/main.py & pid1=$!
          python -u src/run_optum.py & pid2=$!
          python -u src/run_amazon.py & pid3=$!
          python -u src/run_siemens.py & pid4=$!
          python -u src/run_honeywell.py & pid5=$!
          python -u src/run_wellsfargo.py & pid6=$!
          python -u src/run_dell.py & pid7=$!
          python -u src/run_oracle.py & pid8=$!
          python -u src/run_metlife.py & pid9=$!
          python -u src/run_fis.py & pid10=$!
          python -u src/run_chubb.py & pid11=$!
          python -u src/run_spglobal.py & pid12=$!
          python -u src/run_wtw.py & pid13=$!
