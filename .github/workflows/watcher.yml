name: MS, Optum, Amazon, Siemens, Honeywell, Wells Fargo, Dell, Oracle, MetLife, FIS, Chubb, S&P Global (Workday+Careers), WTW, Morningstar, Gallagher, Icertis, Maersk, and Nomura Job Watcher

on:
  schedule:
    - cron: '*/3000000000000 * * * *'   # every 30 minutes
  workflow_dispatch:           # also runnable manually from the GitHub UI

concurrency:
  group: job-watcher
  cancel-in-progress: false    # queue runs; never allow two to write seen_jobs files simultaneously

permissions:
  contents: write              # needed so the job can commit seen_jobs.json back

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install firefox

      - name: Install Playwright system deps
        run: playwright install-deps firefox

      - name: Run all watchers in parallel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
        run: |
          python -u src/main.py & pid1=$!
          python -u src/run_optum.py & pid2=$!
          python -u src/run_amazon.py & pid3=$!
          python -u src/run_siemens.py & pid4=$!
          python -u src/run_honeywell.py & pid5=$!
          python -u src/run_wellsfargo.py & pid6=$!
          python -u src/run_dell.py & pid7=$!
          python -u src/run_oracle.py & pid8=$!
          python -u src/run_metlife.py & pid9=$!
          python -u src/run_fis.py & pid10=$!
          python -u src/run_chubb.py & pid11=$!
          python -u src/run_spglobal.py & pid12=$!
          python -u src/run_wtw.py & pid13=$!
          python -u src/run_morningstar.py & pid14=$!
          python -u src/run_spglobal_careers.py & pid15=$!
          python -u src/run_gallagher.py & pid16=$!
          python -u src/run_icertis.py & pid17=$!
          python -u src/run_maersk.py & pid18=$!
          python -u src/run_nomura.py & pid19=$!
          fail=0
          wait $pid1 || fail=1
          wait $pid2 || fail=1
          wait $pid3 || fail=1
          wait $pid4 || fail=1
          wait $pid5 || fail=1
          wait $pid6 || fail=1
          wait $pid7 || fail=1
          wait $pid8 || fail=1
          wait $pid9 || fail=1
          wait $pid10 || fail=1
          wait $pid11 || fail=1
          wait $pid12 || fail=1
          wait $pid13 || fail=1
          wait $pid14 || fail=1
          wait $pid15 || fail=1
          wait $pid16 || fail=1
          wait $pid17 || fail=1
          wait $pid18 || fail=1
          wait $pid19 || fail=1
          exit $fail

      - name: Save updated seen_jobs files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          test -f seen_jobs_optum.json && git add seen_jobs_optum.json || true
          test -f seen_jobs_amazon.json && git add seen_jobs_amazon.json || true
          test -f seen_jobs_siemens.json && git add seen_jobs_siemens.json || true
          test -f seen_jobs_honeywell.json && git add seen_jobs_honeywell.json || true
          test -f seen_jobs_wellsfargo.json && git add seen_jobs_wellsfargo.json || true
          test -f seen_jobs_dell.json && git add seen_jobs_dell.json || true
          test -f seen_jobs_oracle.json && git add seen_jobs_oracle.json || true
          test -f seen_jobs_metlife.json && git add seen_jobs_metlife.json || true
          test -f seen_jobs_fis.json && git add seen_jobs_fis.json || true
          test -f seen_jobs_chubb.json && git add seen_jobs_chubb.json || true
          test -f seen_jobs_spglobal.json && git add seen_jobs_spglobal.json || true
          test -f seen_jobs_wtw.json && git add seen_jobs_wtw.json || true
          test -f seen_jobs_morningstar.json && git add seen_jobs_morningstar.json || true
          test -f seen_jobs_spglobal_careers.json && git add seen_jobs_spglobal_careers.json || true
          test -f seen_jobs_gallagher.json && git add seen_jobs_gallagher.json || true
          test -f seen_jobs_icertis.json && git add seen_jobs_icertis.json || true
          test -f seen_jobs_maersk.json && git add seen_jobs_maersk.json || true
          test -f seen_jobs_nomura.json && git add seen_jobs_nomura.json || true
          if git diff --staged --quiet; then
            echo "No new jobs this run"
          else
            git commit -m "chore: update seen_jobs.json [skip ci]"
            git pull --rebase origin master
            git push
          fi
