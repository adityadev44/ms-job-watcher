name: MS, Optum, Amazon, Siemens, and Honeywell Job Watcher

on:
  schedule:
    - cron: '*/3000000000000 * * * *'   # every 30 minutes
  workflow_dispatch:           # also runnable manually from the GitHub UI

permissions:
  contents: write              # needed so the job can commit seen_jobs.json back

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install firefox

      - name: Install Playwright system deps
        run: playwright install-deps firefox

      - name: Run all watchers in parallel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
        run: |
          python -u src/main.py & pid1=$!
          python -u src/run_optum.py & pid2=$!
          python -u src/run_amazon.py & pid3=$!
          python -u src/run_siemens.py & pid4=$!
          python -u src/run_honeywell.py & pid5=$!
          fail=0
          wait $pid1 || fail=1
          wait $pid2 || fail=1
          wait $pid3 || fail=1
          wait $pid4 || fail=1
          wait $pid5 || fail=1
          exit $fail

      - name: Save updated seen_jobs files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          test -f seen_jobs_optum.json && git add seen_jobs_optum.json || true
          test -f seen_jobs_amazon.json && git add seen_jobs_amazon.json || true
          test -f seen_jobs_siemens.json && git add seen_jobs_siemens.json || true
          test -f seen_jobs_honeywell.json && git add seen_jobs_honeywell.json || true
          if git diff --staged --quiet; then
            echo "No new jobs this run"
          else
            git commit -m "chore: update seen_jobs.json [skip ci]"
            git pull --rebase origin master
            git push
          fi
